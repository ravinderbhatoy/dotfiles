# EndeavourOS-inspired i3blocks setup adapted for this machine.

separator=false
markup=pango

[terminal]
command=~/.config/i3/scripts/i3blocks-click "" kitty
color=#807dfe
interval=once

[browser]
command=~/.config/i3/scripts/i3blocks-click "" chromium
color=#4aa3ff
interval=once

[files]
command=~/.config/i3/scripts/i3blocks-click "" thunar /home/raypamber
color=#7f3fbf
interval=once

[whatsapp]
command=~/.config/i3/scripts/i3blocks-click "" chromium --app=https://web.whatsapp.com
color=#25d366
interval=once

[telegram]
command=~/.config/i3/scripts/i3blocks-click "" Telegram
color=#29a9ea
interval=once

[sep-left]
full_text=: :
color=#717171

[disk]
label=
command=~/.config/i3/scripts/i3blocks-disk
interval=30

[memory]
label=
command=~/.config/i3/scripts/i3blocks-memory
interval=5

[network]
command=~/.config/i3/scripts/i3blocks-network
interval=10

[battery]
command=~/.config/i3/scripts/i3blocks-battery
interval=30

[sep-center]
full_text=: :
color=#717171

[pavucontrol]
command=~/.config/i3/scripts/i3blocks-click "♪" pavucontrol
interval=once

[volume]
command=~/.config/i3/scripts/i3blocks-volume
interval=once
signal=10

[time]
command=date '+%a %d %b %H:%M:%S'
interval=1

[power]
command=~/.config/i3/scripts/i3blocks-powermenu
interval=once
color=#ff6b6b
