include-file = ~/.config/polybar/colors
include-file = ~/.config/polybar/modules

[global/wm]
margin-bottom = 0
margin-top = 0

[bar/main]
monitor = ${env:MONITOR:}
monitor-fallback =
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 100%
height = 20pt
offset-x = 0
offset-y = 0
radius = 0

background = ${colors.window-background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0

padding-left = 0
padding-right = 0
module-margin = 0

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrains Mono:size=10;3"
font-1 = "JetBrains Mono:size=10;2"
font-2 = "JetBrainsMono Nerd Font:size=11;2"
font-3 = "Symbols Nerd Font:size=20;4"
font-4 = "JetBrains Mono:size=11;2"

modules-left = launcher i3
modules-center = date
modules-right = pulseaudio memory cpu network battery sessionLogout

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${colors.window-background}
tray-padding = 4
tray-scale = 1.0

wm-restack = i3
cursor-click = pointer
scroll-up = #i3.next
scroll-down = #i3.prev
enable-ipc = true

[settings]
screenchange-reload = false
pseudo-transparency = false
